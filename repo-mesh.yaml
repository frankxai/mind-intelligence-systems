# ─────────────────────────────────────────────
# GOVERNANCE
# ─────────────────────────────────────────────
governance:
  doctrine: "NAMING_DOCTRINE.md"
  architecture: "ARCHITECTURE.md"
  mesh: "REPO_MESH.md"
  primary_branch_pattern: "hermes/foundation-*"
  mesh_integrity_rules:
    - "No circular dependencies"
    - "All repos must declare depends_on honestly"
    - "Canon has zero external dependencies"
    - "Protection repos may not depend on creative repos"
    - "All repos consuming HMIS modules must declare consumes_hmis_modules"
