# repo-mesh.yaml
# Canonical mesh for Mind Intelligence Systems portfolio
# frankxai Sovereign Intelligence Empire — v3.0

version: "0.3.0"
updated: "2026-06-18"
ontology_version: "0.1.0"

umbrella: "mind-intelligence-systems"
founder: "frankxai"

# ─────────────────────────────────────────────
# LAYER 0: Canon & Governance (this repo)
# ─────────────────────────────────────────────
# mind-intelligence-systems is the root — no external depends_on

# ─────────────────────────────────────────────
# LAYER 1: Personal & Runtime OS
# ─────────────────────────────────────────────
repos:
  - name: "agentic-mind-os"
    role: "personal-os"
    layer: 1
    manifest: "mindpack.yaml"
    depends_on: ["research-intelligence-os", "mind-intelligence-systems"]
    consumes_hmis_modules: ["attention", "memory", "emotion", "motivation", "identity", "learning", "metacognition"]
    provides: ["vault-templates", "personal-agents", "mind-skills"]
    url: "https://github.com/frankxai/agentic-mind-os"

  - name: "research-intelligence-os"
    role: "runtime-layer"
    layer: 1
    manifest: "research-os.yaml"
    depends_on: ["mind-intelligence-systems"]
    consumes_hmis_modules: ["attention", "memory", "learning", "belief"]
    provides: ["contracts", "templates", "evals", "scripts"]
    url: "https://github.com/frankxai/research-intelligence-os"

# ─────────────────────────────────────────────
# LAYER 2: Portfolio & Creative OS
# ─────────────────────────────────────────────
  - name: "research-intelligence-systems"
    role: "research-portfolio"
